name: Bun CI

concurrency:
  group: bun-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main] # 确保这里是英文 branches
    paths-ignore:
      - "*.md"
  pull_request:
    branches: [main] # 确保这里是英文 branches
    paths-ignore:
      - "*.md"

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 建议扩展测试平台，防止跨平台兼容性问题
        os: [ubuntu-latest, windows-latest] 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: "0" # 加上引号更安全

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          auto-setup: true

      # 【新增】必须先安装依赖，否则 moon ci 会失败
      - name: Install dependencies
        run: bun install

      - name: Run CI
        run: moon ci
